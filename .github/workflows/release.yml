name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # Dispara quando você criar uma tag como v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          # Nota: Para Tauri v2 no Ubuntu 22.04, pode ser necessário libwebkit2gtk-4.1-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Substituído automaticamente pelo tauri-action
          releaseName: "Recovery Rust v__VERSION__"
          releaseBody: "Nova versão automatizada do Recovery Rust. Verifique os assets abaixo para o seu sistema."
          releaseDraft: true
          prerelease: false
